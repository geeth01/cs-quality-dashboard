name: Update Dashboard Data

on:
  schedule:
    # Daily at 7:30 AM IST (2:00 AM UTC)
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the CSV changes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch data from Google Sheets
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          E2E_SHEET_ID: ${{ secrets.E2E_SHEET_ID }}
        run: python scripts/fetch_from_sheets.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/cs_unit_test.csv public/data/cs_e2e_test.csv
          git diff --staged --quiet && echo "No data changes, skipping commit." || (
            git commit -m "chore: refresh dashboard data [skip ci]" &&
            git push
          )
